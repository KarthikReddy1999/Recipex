name: Supabase Keep Alive

on:
  schedule:
    - cron: "17 3 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase PostgREST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -eu

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY secret."
            exit 1
          fi

          base_url="${SUPABASE_URL%/}"
          ping_url="${base_url}/rest/v1/saved_recipes?select=id&limit=1"

          http_code="$(curl --silent --show-error --location \
            --output /tmp/supabase_ping.json \
            --write-out "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Accept: application/json" \
            "${ping_url}")"

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "Supabase keep-alive failed with HTTP ${http_code}"
            cat /tmp/supabase_ping.json
            exit 1
          fi

          echo "Supabase keep-alive succeeded (HTTP ${http_code})."
